<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuadrilla - Dinámico</title>
    <style>
        /* Estilos base simulando App Móvil */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            margin: 0;
        }
        .app-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center; color: #1f2937; font-size: 22px; margin-top: 0; margin-bottom: 20px;
        }
        .card {
            background-color: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; margin-bottom: 15px;
        }
        label {
            display: block; font-size: 14px; font-weight: bold; color: #4b5563; margin-bottom: 5px;
        }
        input[type="number"], input[type="text"] {
            width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; box-sizing: border-box; margin-bottom: 10px;
        }
        
        /* Lista Dinámica de Obreros */
        .worker-row {
            display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
        }
        .worker-row input { margin-bottom: 0; }
        .worker-name-input { flex: 2; }
        .worker-days-input { flex: 1; text-align: center; }
        
        /* Botones */
        .btn {
            background-color: #2563eb; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background-color: #1d4ed8; }
        .btn-add {
            background-color: #e5e7eb; color: #374151; font-size: 14px; padding: 10px; margin-bottom: 15px; border: 1px dashed #9ca3af; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-add:hover { background-color: #d1d5db; }
        .btn-delete {
            background-color: #fee2e2; color: #dc2626; border: none; border-radius: 6px; width: 35px; height: 35px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        
        /* Resultados */
        .results-card {
            background-color: #ecfdf5; border: 1px solid #34d399; display: none; margin-top: 15px;
        }
        .result-line {
            display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; color: #374151;
        }
        .result-line.negative { color: #dc2626; }
        
        .total-profit {
            display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 2px dashed #34d399; font-size: 18px; font-weight: bold; color: #047857;
        }
        #desgloseObreros {
            font-size: 13px; color: #4b5563; margin-bottom: 10px; line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>👷‍♂️ Mi Cuadrilla</h1>

        <div class="card">
            <label>💰 Ingreso (Anticipos)</label>
            <input type="number" id="ingresos" value="2000000">

            <label>🛒 Gastos extra (Combustible, etc)</label>
            <input type="number" id="gastos" value="225000">
        </div>

        <div class="card">
            <label>💵 Precio del día (Jornal base)</label>
            <input type="number" id="precioDia" value="60000">

            <label style="margin-top: 15px; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 10px;">Días trabajados por obrero:</label>
            
            <div id="listaObreros"></div>

            <button class="btn-add" onclick="agregarObrero()">+ Añadir otro obrero</button>
        </div>

        <button class="btn" onclick="calcularCierre()">Cerrar Semana y Calcular</button>

        <div class="card results-card" id="panelResultados">
            <h3 style="margin-top: 0; color: #047857;">📊 Resumen de Cierre</h3>
            
            <div class="result-line">
                <span>Total Recibido:</span> <span id="resIngresos">$ 0</span>
            </div>
            <div class="result-line negative">
                <span>Total Gastos Extra:</span> <span id="resGastos">- $ 0</span>
            </div>
            <div class="result-line negative" style="font-weight: bold; border-bottom: 1px solid #a7f3d0; padding-bottom: 8px; margin-bottom: 8px;">
                <span>Total Nómina:</span> <span id="resNomina">- $ 0</span>
            </div>

            <div id="desgloseObreros"></div>

            <div class="total-profit">
                <span>TU GANANCIA LIBRE:</span> <span id="resGanancia">$ 0</span>
            </div>
        </div>

    </div>

    <script>
        // Formato moneda COP
        const formatCOP = (numero) => {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(numero);
        };

        // Función para agregar un nuevo registro de obrero a la pantalla
        function agregarObrero(nombre = '', dias = 0) {
            const contenedor = document.getElementById('listaObreros');
            
            const divObrero = document.createElement('div');
            divObrero.className = 'worker-row';
            
            // Creamos los inputs y el botón de eliminar
            divObrero.innerHTML = `
                <input type="text" class="worker-name-input" placeholder="Nombre" value="${nombre}">
                <input type="number" class="worker-days-input" value="${dias}" min="0" max="7" step="0.5" placeholder="Días">
                <button class="btn-delete" onclick="eliminarObrero(this)" title="Eliminar obrero">X</button>
            `;
            
            contenedor.appendChild(divObrero);
        }

        // Función para eliminar la fila de un obrero
        function eliminarObrero(botonEliminar) {
            // El botón está dentro del div 'worker-row', así que eliminamos el padre
            botonEliminar.parentElement.remove();
        }

        // Cálculos finales
        function calcularCierre() {
            const ingresos = parseFloat(document.getElementById('ingresos').value) || 0;
            const gastos = parseFloat(document.getElementById('gastos').value) || 0;
            const precioDia = parseFloat(document.getElementById('precioDia').value) || 0;

            let totalNomina = 0;
            let htmlDesglose = "<b>Pago detallado:</b><br>";

            // Obtener todos los obreros que estén actualmente en la pantalla
            const filasObreros = document.querySelectorAll('.worker-row');
            
            filasObreros.forEach(fila => {
                const nombre = fila.querySelector('.worker-name-input').value || 'Sin nombre';
                const dias = parseFloat(fila.querySelector('.worker-days-input').value) || 0;
                
                const pagoObrero = dias * precioDia;
                totalNomina += pagoObrero;
                
                htmlDesglose += `- ${nombre} (${dias} días): <b>${formatCOP(pagoObrero)}</b><br>`;
            });

            const gananciaNeta = ingresos - gastos - totalNomina;

            // Actualizar la pantalla
            document.getElementById('panelResultados').style.display = 'block';
            document.getElementById('resIngresos').innerText = formatCOP(ingresos);
            document.getElementById('resGastos').innerText = "- " + formatCOP(gastos);
            document.getElementById('resNomina').innerText = "- " + formatCOP(totalNomina);
            
            document.getElementById('desgloseObreros').innerHTML = htmlDesglose;
            document.getElementById('resGanancia').innerText = formatCOP(gananciaNeta);

            const gananciaElement = document.getElementById('resGanancia');
            gananciaElement.style.color = gananciaNeta < 0 ? '#dc2626' : '#047857';
        }

        // Iniciar con dos obreros de ejemplo al abrir la página
        window.onload = function() {
            agregarObrero("Carlos M.", 5.5);
            agregarObrero("Juan P.", 4);
        };
    </script>
</body>
</html>
